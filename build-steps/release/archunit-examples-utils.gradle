import groovy.transform.Field

ext.archunitExamplesGitRepo = 'TNG/ArchUnit-Examples.git'
ext.updateArchUnitExampleVersion = { File archUnitExampleDir ->
    fileTree(archUnitExampleDir) {
        include '**/build.gradle'
    }.each { File buildFile ->
        buildFile.text = buildFile.text.replaceAll(/(com\.tngtech\.archunit:archunit[^:]*:)[\w.-]*/, "\$1${version}")
    }
    fileTree(archUnitExampleDir) {
        include '**/pom.xml'
    }.each { File pomFile ->
        pomFile.text = pomFile.text.replaceAll(
                /(com\.tngtech\.archunit<\/groupId>\n\s*<artifactId>archunit[^<]*<\/artifactId>\n\s*<version>)[\w.-]*/,
                "\$1${version}")
    }
}
ext.updateArchUnitExampleSources = { File targetArchUnitExampleDir ->
    updateArchUnitExampleDependencies(targetArchUnitExampleDir)
    updateArchUnitExampleJavaSources(targetArchUnitExampleDir)
    updateArchUnitExampleGradleWrapper(targetArchUnitExampleDir)
}

@Field
String archUnitExamplesRootBuildFileContent = """\
subprojects {
    apply plugin: 'java-library'

    repositories {
        mavenCentral()
    }

    dependencies {
        // These are the 'production' dependencies of the Demo src/main/java files -> just for Demo purposes, otherwise irrelevant
#{dependencies}
    }
}
"""

@Field
String archUnitExamplesRootPomFileContent = """\
<?xml version="1.0" encoding="UTF-8"?>
<project xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd" xmlns="http://maven.apache.org/POM/4.0.0"
         xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
    <modelVersion>4.0.0</modelVersion>
    <groupId>com.tngtech.archunit</groupId>
    <artifactId>archunit-examples</artifactId>
    <version>#{version}</version>
    <packaging>pom</packaging>
    <dependencies>
#{dependencies}
    </dependencies>
    <build>
        <plugins>
            <plugin>
                <groupId>org.apache.maven.plugins</groupId>
                <artifactId>maven-compiler-plugin</artifactId>
                <configuration>
                    <source>1.8</source>
                    <target>1.8</target>
                </configuration>
            </plugin>
            <plugin>
                <groupId>org.apache.maven.plugins</groupId>
                <artifactId>maven-surefire-plugin</artifactId>
                <version>3.5.6</version>
            </plugin>
        </plugins>
    </build>
    <modules>
        <module>example-junit4</module>
        <module>example-junit5</module>
        <module>example-plain</module>
    </modules>
</project>
"""

private void updateArchUnitExampleDependencies(File targetArchUnitExampleDir) {
    List<Map<String, String>> sortedDependencies = archUnitExamplesMainDependencies.collect()
            .sort { first, second -> first.get().group <=> second.get().group ?: first.get().name <=> second.get().name }

    String gradleDependencies = sortedDependencies.collect { it.get() }.collect {
        "        implementation '${it.group}:${it.name}:${it.version}'"
    }.join('\n') // always Unix line separator
    def buildFile = new File(targetArchUnitExampleDir, 'build.gradle')
    buildFile.text = archUnitExamplesRootBuildFileContent.replace('#{dependencies}', gradleDependencies)

    String pomDependencies = sortedDependencies.collect { it.get() }.collect {
        """\
        <dependency>
            <groupId>${it.group}</groupId>
            <artifactId>${it.name}</artifactId>
            <version>${it.version}</version>
        </dependency>"""
    }.join('\n')
    def pomFile = new File(targetArchUnitExampleDir, 'pom.xml')
    pomFile.text = archUnitExamplesRootPomFileContent.replace('#{version}', version).replace('#{dependencies}', pomDependencies)
}

private List updateArchUnitExampleJavaSources(File targetArchUnitExampleDir) {
    ['example-plain', 'example-junit4', 'example-junit5', 'example-junit6'].each { exampleFolder ->
        def targetSource = new File(new File(targetArchUnitExampleDir, exampleFolder), 'src')
        targetSource.deleteDir()
        copy {
            from new File(project(':archunit-example:example-plain').projectDir, 'src/main')
            into new File(targetSource, 'main')
        }
        copy {
            from new File(project(":archunit-example:${exampleFolder}").projectDir, 'src/test')
            into new File(targetSource, 'test')
        }
    }
}

private void updateArchUnitExampleGradleWrapper(File targetArchUnitExampleDir) {
    copy {
        from(['gradlew', 'gradlew.bat'].collect { new File(rootProject.projectDir, it) })
        into targetArchUnitExampleDir.toPath()
    }
    String wrapperDir = 'gradle/wrapper'
    copy {
        from(['gradle-wrapper.properties', 'gradle-wrapper.jar'].collect { new File(rootProject.projectDir, "${wrapperDir}/${it}") })
        into new File(targetArchUnitExampleDir, wrapperDir)
    }
}